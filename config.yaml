workspace_root: .
max_iterations: 12
max_read_bytes: 65536
max_search_results: 100
max_list_entries: 200
max_command_count: 8
max_runtime_seconds: 900
max_plan_revisions: 3
max_recovery_attempts_per_issue: 2
budget_warning_ratio: 0.8
reflection_replan_threshold: 60
reflection_stop_threshold: 30
approval_ui_mode: detailed
default_timeout_seconds: 120
max_output_bytes: 65536
max_stderr_bytes: 32768
command_allowlist:
  - uv run pytest
  - uv run mypy
  - uv run ruff
  - pytest
  - python -m pytest
  - mypy
  - python -m mypy
  - ruff
  - python -m ruff
  - git status
  - git diff
  - git --no-pager diff
  - ls
  - pwd
  - find
  - rg
  - curl -s
  - curl -sL
  - cat
  - head
  - tail
  - sort
  - uniq
  - echo
  - wc -c
command_denylist:
  - sudo
  - su
  - sh -c
  - bash -c
  - zsh -c
  - python -c
  - python3 -c
  - rm
  - mv
  - chmod
  - chown
  - curl
  - wget
  - ssh
  - scp
  - rsync
  - dd
  - mkfs
  - systemctl
  - crontab
command_env_allowlist:
  - CI
  - FORCE_COLOR
  - MYPYPATH
  - NO_COLOR
  - PYTEST_ADDOPTS
  - PYTHONPATH
  - RUFF_OUTPUT_FORMAT
command_working_dirs:
  - .
write_requires_approval: true
max_patch_bytes: 32768
max_patch_hunks: 24
backup_dir: .linux-agent/backups
auto_rollback_on_verify_failure: true
llm_model: deepseek-v4-pro
llm_temperature: 0.0
llm_base_url: https://api.deepseek.com
log_dir: logs

# Export DEEPSEEK_API_KEY in your shell instead of storing secrets here.
